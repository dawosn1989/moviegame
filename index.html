<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinema Riddle Arcade</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; /* Uses dynamic viewport height to account for mobile browser bars */
            overflow: hidden; /* Prevents rubber-band scrolling */
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100dvh; /* Takes full screen on mobile */
            max-height: 900px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 15px;
            box-sizing: border-box;
        }

        /* Adds rounded corners only on larger desktop/tablet screens */
        @media (min-width: 520px) {
            .game-container {
                height: 95vh;
                border-radius: 12px;
                padding: 20px;
            }
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            flex-shrink: 0; /* Prevents header from squishing */
        }

        .leaderboard-link { color: #00e676; text-decoration: none; font-size: 1rem; }
        .leaderboard-link:hover { text-decoration: underline; }

        #score-container { display: flex; flex-direction: column; gap: 2px; }
        #score-board { color: #ffcc00; }
        #potential-board { font-size: 0.85rem; color: #aaa; font-weight: normal; }
        
        #leaderboard-container { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        #strike-board { color: #ff4444; letter-spacing: 2px; font-size: 1.1rem; }
        
        #mute-btn {
            background: none; border: none; color: #ffcc00; font-size: 1.2rem; 
            cursor: pointer; padding: 5px 0 0 0; opacity: 0.7; transition: opacity 0.2s;
        }
        #mute-btn:hover { opacity: 1; }

        #text-display {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #ffcc00;
            min-height: 2.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-shrink: 0;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            flex: 1 1 auto; /* MAGIC FIX: Allows poster to shrink/grow based on screen size */
            min-height: 150px; 
            max-height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            background-color: #050505;
            border-radius: 8px;
            overflow: hidden;
        }

        #movie-thumb {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: blur(30px);
            transition: filter opacity ease-out;
            opacity: 0;
        }

        .clues-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Pushes clues down if space is tight */
            gap: 5px;
            flex: 0 1 auto;
            min-height: 140px; /* Lowered to give buttons more room */
            margin-bottom: 10px;
        }

        .clues-container p {
            font-size: 0.9rem; margin: 0; padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05); border-radius: 6px;
            width: 90%; text-align: center; opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
        .clues-container p.visible { opacity: 1; transform: translateY(0); }

        .choices-container {
            width: 100%; 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 10px; 
            flex-shrink: 0; /* Ensures buttons never get squished */
            transition: opacity 0.2s ease;
        }

        .choice-btn {
            background-color: #222; color: #fff; border: 2px solid #444;
            padding: 12px 10px; font-size: 0.9rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease; text-align: center;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            /* Prevents touch zoom on mobile */
            touch-action: manipulation;
        }
        .choice-btn:hover:not(:disabled) { background-color: #333; border-color: #ffcc00; }
        .choice-btn.correct { background-color: #1b5e20 !important; border-color: #4caf50 !important; }
        .choice-btn.wrong { background-color: #b71c1c !important; border-color: #f44336 !important; opacity: 0.6; }

        .footer-navigation { 
            width: 100%; display: flex; flex-direction: column; 
            align-items: center; margin-top: 15px; flex-shrink: 0; 
        }
        
        .progress-wrapper { width: 100%; height: 6px; background-color: #222; border-radius: 4px; overflow: hidden; }
        #progress-bar { width: 100%; height: 100%; background-color: #ffcc00; }
        #potential-board { font-size: 0.9rem; color: #aaa; margin-top: 6px; font-weight: bold; letter-spacing: 0.5px; transition: opacity 0.2s ease; }

        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
            z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #222; padding: 30px; border-radius: 12px; text-align: center;
            border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            max-width: 85%;
        }
        .modal-content h2 { margin-top: 0; color: #ffcc00; letter-spacing: 2px;}
        .modal-content input {
            background: #111; border: 2px solid #444; color: #fff; font-size: 2rem;
            text-align: center; width: 140px; padding: 5px; border-radius: 6px; text-transform: uppercase; letter-spacing: 4px; margin: 15px 0;
        }
        .modal-content input:focus { border-color: #ffcc00; outline: none; }
        .modal-content button {
            background: #ffcc00; color: #000; border: none; padding: 10px 20px;
            font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        
        #start-overlay { z-index: 100; background: #000; }
    </style>
</head>
<body>

    <audio id="bgm-player" loop src="bgm.mp3"></audio>
    <audio id="theme-player" loop></audio>
    <audio id="sfx-correct" src="correct.mp3"></audio>
    <audio id="sfx-wrong" src="wrong.mp3"></audio>

    <div class="game-container">
        
        <div id="start-overlay" class="modal-overlay active">
            <div class="modal-content">
                <h2>CINEMA ARCADE</h2>
                <p style="color: #aaa; margin-bottom: 25px;">Ready to play?</p>
                <button id="start-game-btn">INSERT COIN</button>
            </div>
        </div>

        <div id="initials-modal" class="modal-overlay">
            <div class="modal-content">
                <h2>NEW HIGH SCORE!</h2>
                <div id="modal-score-text">Score: 0</div>
                <input type="text" id="initials-input" maxlength="3" placeholder="AAA" autocomplete="off">
                <br>
                <button id="submit-initials-btn">SAVE RECORD</button>
            </div>
        </div>

        <div class="game-header">
            <div id="score-container">
                <div id="score-board">Score: 0</div>
            </div>
            <div id="leaderboard-container">
                <div id="top-score-board"><a href="/leaderboard" target="_blank" class="leaderboard-link">Top: Loading...</a></div>
                <div id="strike-board"></div>
                <button id="mute-btn" title="Toggle Audio">🔊</button>
            </div>
        </div>

        <div id="text-display">Waiting to start...</div>

        <div class="image-wrapper">
            <img id="movie-thumb" src="" alt="Movie Poster">
        </div>

        <div class="clues-container">
            <p id="clue-year"></p>
            <p id="clue-contentRating"></p>
            <p id="clue-runtime"></p>
            <p id="clue-studio"></p> 
            <p id="clue-genres"></p>
            <p id="clue-directors"></p> 
            <p id="clue-tagline"></p>
        </div>

        <div id="choices-box" class="choices-container"></div>

        <div class="footer-navigation">
            <div class="progress-wrapper">
                <div id="progress-bar"></div>
            </div>
            <div id="potential-board">Value: 1000</div>
        </div>
    </div>

    <script>
        const textDisplay = document.getElementById('text-display');
        const movieThumb = document.getElementById('movie-thumb');
        const progressBar = document.getElementById('progress-bar'); 
        const choicesBox = document.getElementById('choices-box');
        const scoreBoard = document.getElementById('score-board');
        const potentialBoard = document.getElementById('potential-board');
        const strikeBoard = document.getElementById('strike-board');
        const topScoreBoard = document.getElementById('top-score-board');
        const initialsModal = document.getElementById('initials-modal');
        const initialsInput = document.getElementById('initials-input');
        const modalScoreText = document.getElementById('modal-score-text');
        const submitInitialsBtn = document.getElementById('submit-initials-btn');
        const startOverlay = document.getElementById('start-overlay');
        const startGameBtn = document.getElementById('start-game-btn');
        const muteBtn = document.getElementById('mute-btn');
        
        const themePlayer = document.getElementById('theme-player');
        const bgmPlayer = document.getElementById('bgm-player');
        const sfxCorrect = document.getElementById('sfx-correct');
        const sfxWrong = document.getElementById('sfx-wrong');
        
        bgmPlayer.volume = 0.15;
        sfxCorrect.volume = 0.6;
        sfxWrong.volume = 0.6;
        
        let isMuted = false;
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.textContent = isMuted ? '🔇' : '🔊';
            
            bgmPlayer.muted = isMuted;
            themePlayer.muted = isMuted;
            sfxCorrect.muted = isMuted;
            sfxWrong.muted = isMuted;
        });

        const clueElements = {
            year: document.getElementById('clue-year'),
            contentRating: document.getElementById('clue-contentRating'),
            runtime: document.getElementById('clue-runtime'), 
            studio: document.getElementById('clue-studio'),   
            genres: document.getElementById('clue-genres'),
            tagline: document.getElementById('clue-tagline'),
            directors: document.getElementById('clue-directors')
        };

        let moviesList = [];
        let showsList = [];
        let movieIndex = 0;
        let showIndex = 0;
        
        const TV_SHOW_FREQUENCY = 7; 
        let totalRoundsPlayed = 1; 

        let activeTimeouts = []; 
        let scoreTickerInterval = null; 
        let fadeAudioInterval = null;
        
        let score = 0;
        let strikes = 0;
        let potentialPoints = 1000;
        let hasGuessed = false;
        let isSystemActive = false;
        let currentCluesTimeline = []; 

        const revealAnswerDuration = 5000; 
        const totalUnblurTime = 10000;     

        let topScore = 0;
        let topInitials = "---";

        function isTVShow(data) {
            if (!data) return false;
            return data.riddle === "Guess this hit TV Show!" || 
                   (data.runtime && (data.runtime.includes("Episode") || data.runtime.includes("TV Series")));
        }

        async function syncLeaderboardFromServer() {
            let data;
            try {
                const res = await fetch('/api/leaderboard');
                if (!res.ok) throw new Error("Network error");
                data = await res.json();
            } catch (err) {
                console.warn("Error updating leaderboard (using mock data for preview):", err);
                data = [{ initials: "CPU", score: 5000 }];
            }
            
            if (Array.isArray(data) && data.length > 0) {
                topScore = data[0].score || 0;
                topInitials = data[0].initials || "---";
            }
            updateStatsDisplay();
        }

        async function initGameData() {
            let data;
            try {
                const response = await fetch('all_movies_with_riddles.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                data = await response.json();
            } catch (error) {
                console.warn("Error loading JSON data (using mock data for preview):", error);
                data = [
                    { title: "The Matrix", year: 1999, contentRating: "R", runtime: "2 hrs 16 mins", studio: "Warner Bros.", genres: [{tag: "Sci-Fi"}, {tag: "Action"}], directors: [{tag: "The Wachowskis"}], tagline: "Welcome to the Real World.", riddle: "Red or Blue pill?", thumbFile: "https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg" },
                    { title: "Inception", year: 2010, contentRating: "PG-13", runtime: "2 hrs 28 mins", studio: "Warner Bros.", genres: [{tag: "Sci-Fi"}, {tag: "Thriller"}], directors: [{tag: "Christopher Nolan"}], tagline: "Your mind is the scene of the crime.", riddle: "A dream within a dream.", thumbFile: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg" },
                    { title: "Breaking Bad", year: 2008, contentRating: "TV-MA", runtime: "TV Series", studio: "AMC", genres: [{tag: "Crime"}, {tag: "Drama"}], directors: [{tag: "Vince Gilligan"}], tagline: "All Hail The King.", riddle: "Guess this hit TV Show!", thumbFile: "https://image.tmdb.org/t/p/w500/ggFHVbUOKlW2aAez567u4803z25.jpg" },
                    { title: "The Godfather", year: 1972, contentRating: "R", runtime: "2 hrs 55 mins", studio: "Paramount", genres: [{tag: "Crime"}, {tag: "Drama"}], directors: [{tag: "Francis Ford Coppola"}], tagline: "An offer you can't refuse.", riddle: "Leave the gun, take the cannoli.", thumbFile: "https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg" }
                ];
            }

            data.forEach(item => {
                if (item && typeof item.thumbFile === 'string') item.thumbFile = sanitizePath(item.thumbFile);
                if (item && typeof item.themeAudio === 'string') item.themeAudio = sanitizePath(item.themeAudio);
                
                if (isTVShow(item)) {
                    showsList.push(item);
                } else {
                    moviesList.push(item);
                }
            });

            if (moviesList.length > 0) shuffleArray(moviesList);
            if (showsList.length > 0) shuffleArray(showsList);

            if (moviesList.length > 0 || showsList.length > 0) {
                syncLeaderboardFromServer(); 
            } else {
                textDisplay.textContent = "Data file is empty.";
            }
        }
        
        // Initialize fetch data
        initGameData();

        startGameBtn.addEventListener('click', () => {
            startOverlay.classList.remove('active');
            isSystemActive = true;
            totalRoundsPlayed = 1; 
            if(bgmPlayer.paused) bgmPlayer.play().catch(e => console.log("BGM Init Blocked:", e));
            loadNextMovie();
        });

        function sanitizePath(path) {
            return (typeof path === 'string') ? path.replace(/\\/g, "/") : null;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function formatArrayClue(arr, propertyName = "tag") {
            if (!arr || !Array.isArray(arr) || arr.length === 0) return "";
            return arr.map(item => {
                if (item && typeof item === 'object' && item[propertyName]) return item[propertyName];
                if (typeof item === 'string') return item;
                return null;
            })
            .filter(item => item !== null && item !== undefined && String(item).toLowerCase() !== 'null' && String(item).trim() !== '') 
            .join(', ');
        }

        function generateMultipleChoices(currentData) {
            let correctTitle = currentData.title || "Unknown Title";
            let options = [correctTitle];
            let currentIsTV = isTVShow(currentData);

            let poolSource = currentIsTV ? showsList : moviesList;
            
            let pool = poolSource
                .filter(m => m && m.title && m.title !== correctTitle)
                .map(m => m.title);
            
            shuffleArray(pool);
            for (let i = 0; i < 3; i++) { 
                if (pool[i]) options.push(pool[i]); 
            }
            
            shuffleArray(options); 
            return options;
        }

        function fadeOutThemeAudio() {
            if (fadeAudioInterval) clearInterval(fadeAudioInterval);
            if (themePlayer.paused) return;

            fadeAudioInterval = setInterval(() => {
                if (themePlayer.volume > 0.03) {
                    themePlayer.volume -= 0.03;
                } else {
                    clearInterval(fadeAudioInterval);
                    themePlayer.pause();
                    themePlayer.src = "";
                    if (isSystemActive && bgmPlayer.paused) bgmPlayer.play().catch(e => console.warn("Audio play error:", e)); 
                }
            }, 50);
        }

        function stopThemeAudioImmediate() {
            if (fadeAudioInterval) clearInterval(fadeAudioInterval);
            themePlayer.pause();
            themePlayer.src = "";
            if (isSystemActive && bgmPlayer.paused) bgmPlayer.play().catch(e => console.warn("Audio play error:", e));
        }

        function updateStatsDisplay() {
            scoreBoard.textContent = `Score: ${score}`;
            potentialBoard.textContent = `Value: ${potentialPoints}`;
            strikeBoard.textContent = "❌".repeat(strikes);
            topScoreBoard.innerHTML = `<a href="/leaderboard" target="_blank" class="leaderboard-link">Top: ${topInitials} ${topScore}</a>`;
        }

        function clearAllTimeouts() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
            if (scoreTickerInterval) {
                clearInterval(scoreTickerInterval);
                scoreTickerInterval = null;
            }
        }

        function resetDisplay() {
            clearAllTimeouts(); 
            stopThemeAudioImmediate();
            hasGuessed = false;
            potentialPoints = 1000;
            currentCluesTimeline = [];

            textDisplay.textContent = '';
            choicesBox.innerHTML = ''; 
            choicesBox.style.opacity = '1';
            
            movieThumb.style.transition = 'none';
            movieThumb.style.filter = 'blur(30px)';
            movieThumb.style.opacity = '0';
            movieThumb.src = '';

            progressBar.style.transition = 'none';
            progressBar.style.width = '100%';
            progressBar.style.opacity = '1';
            potentialBoard.style.opacity = '1';

            void movieThumb.offsetWidth; 
            void progressBar.offsetWidth;

            Object.values(clueElements).forEach(el => {
                el.textContent = '';
                el.classList.remove('visible');
            });
            updateStatsDisplay();
        }

        function displayClueWithLabel(element, label, value) {
            const stringValue = (value !== null && value !== undefined) ? String(value).trim() : "";
            if (element && stringValue !== "" && stringValue !== "null") {
                let displayValue = stringValue;
                if (label === "Tagline") displayValue = `"${stringValue}"`;
                element.textContent = `${label}: ${displayValue}`;
                element.classList.add('visible');
            }
        }

        function forceRevealAllClues() {
            currentCluesTimeline.forEach(clue => {
                displayClueWithLabel(clue.el, clue.label, clue.value);
            });
        }

        function checkStrikeOutCondition() {
            if (strikes >= 3) {
                const processGameOver = (latestData) => {
                    const scoresList = Array.isArray(latestData) ? latestData : [];
                    const qualifiesForLeaderboard = scoresList.length < 3 || score > (scoresList[2]?.score || 0);

                    if (qualifiesForLeaderboard) {
                        modalScoreText.textContent = `Final Score: ${score}`;
                        initialsInput.value = '';
                        initialsModal.classList.add('active');
                        initialsInput.focus();
                    } else {
                        score = 0;
                        strikes = 0;
                        totalRoundsPlayed = 1; 
                        syncLeaderboardFromServer();
                        loadNextMovie();
                    }
                };

                fetch('/api/leaderboard')
                    .then(res => {
                        if (!res.ok) throw new Error("Network error");
                        return res.json();
                    })
                    .then(processGameOver)
                    .catch(err => {
                        console.warn("Mocking game over stats (expected in preview):", err);
                        processGameOver([{score: topScore, initials: topInitials}]);
                    });
                return true; 
            }
            return false;
        }

        submitInitialsBtn.addEventListener('click', async () => {
            let initials = initialsInput.value.trim().toUpperCase() || "AAA";
            const payload = { initials: initials, score: score };

            try {
                const response = await fetch('/api/leaderboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Save failed");
            } catch (err) {
                console.warn("Failed storing record entry (expected in preview):", err);
                if (score > topScore) { topScore = score; topInitials = initials; }
            }
            
            score = 0;
            strikes = 0;
            totalRoundsPlayed = 1; 
            initialsModal.classList.remove('active');
            syncLeaderboardFromServer();
            loadNextMovie();
        });

        function handleGuess(selectedTitle, correctTitle, buttonElements) {
            if (hasGuessed) return;
            hasGuessed = true;

            fadeOutThemeAudio(); 
            progressBar.style.transition = 'none';
            progressBar.style.opacity = '0';
            potentialBoard.style.opacity = '0';

            if (scoreTickerInterval) { clearInterval(scoreTickerInterval); scoreTickerInterval = null; }

            buttonElements.forEach(btn => btn.disabled = true);
            forceRevealAllClues(); 

            if (selectedTitle === correctTitle) {
                sfxCorrect.currentTime = 0;
                sfxCorrect.play().catch(e => console.warn("Audio play error:", e));
                score += potentialPoints; 
                buttonElements.forEach(btn => { if (btn.textContent === correctTitle) btn.classList.add('correct'); });
                
                updateStatsDisplay();
                activeTimeouts.forEach(clearTimeout);

                const briefPauseId = setTimeout(() => {
                    choicesBox.style.opacity = '0';
                    revealMoviePoster(correctTitle);
                }, 1500);
                activeTimeouts.push(briefPauseId);

            } else {
                sfxWrong.currentTime = 0;
                sfxWrong.play().catch(e => console.warn("Audio play error:", e));
                strikes += 1;
                potentialPoints = 0; 
                buttonElements.forEach(btn => {
                    if (btn.textContent === selectedTitle) btn.classList.add('wrong');
                    if (btn.textContent === correctTitle) btn.classList.add('correct');
                });

                updateStatsDisplay();
                activeTimeouts.forEach(clearTimeout);

                const briefPauseId = setTimeout(() => {
                    choicesBox.style.opacity = '0';
                    if (!checkStrikeOutCondition()) revealMoviePoster(correctTitle);
                }, 1500);
                activeTimeouts.push(briefPauseId);
            }
        }

        function revealMoviePoster(correctTitle) {
            choicesBox.innerHTML = ''; 
            movieThumb.style.transition = 'filter 0.3s ease-out';
            movieThumb.style.filter = 'blur(0px)'; 
            textDisplay.textContent = correctTitle;
            potentialPoints = 0;
            updateStatsDisplay();

            const nextLoopId = setTimeout(loadNextMovie, revealAnswerDuration);
            activeTimeouts.push(nextLoopId);
        }

        function runMovieSequence(movieData) {
            if (!movieData) { loadNextMovie(); return; }
            resetDisplay();

            const imagePath = sanitizePath(movieData.thumbFile);
            if (!imagePath) { console.warn("Skipping asset:", movieData.title); loadNextMovie(); return; }

            const correctTitle = movieData.title || "Unknown Title";
            const choices = generateMultipleChoices(movieData);
            let btnElements = [];

            choices.forEach(choiceText => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choiceText;
                btn.addEventListener('click', () => handleGuess(choiceText, correctTitle, btnElements));
                choicesBox.appendChild(btn);
                btnElements.push(btn);
            });

            textDisplay.textContent = (movieData.riddle && String(movieData.riddle).trim() !== "") ? movieData.riddle : "Guess the Mystery Movie!";
            
            movieThumb.src = imagePath;
            movieThumb.style.transition = `filter ${totalUnblurTime}ms linear, opacity 1s ease-in`;
            movieThumb.style.opacity = '1';
            movieThumb.style.filter = 'blur(5px)'; 

            progressBar.style.transition = `width ${totalUnblurTime}ms linear`;
            progressBar.style.width = '0%';

            if (movieData.themeAudio && movieData.themeAudio.trim() !== "") {
                bgmPlayer.pause();
                themePlayer.src = movieData.themeAudio;
                themePlayer.volume = 0.4;
                themePlayer.play().catch(e => console.log("Theme Autoplay blocked:", e));
            } else {
                if(bgmPlayer.paused && isSystemActive) bgmPlayer.play().catch(e => console.log("BGM blocked:", e));
            }

            const tickRate = 50; 
            const totalTicks = totalUnblurTime / tickRate; 
            const pointsPerTick = 1000 / totalTicks; 

            scoreTickerInterval = setInterval(() => {
                if (potentialPoints > 0) {
                    potentialPoints = Math.max(0, Math.round(potentialPoints - pointsPerTick));
                    potentialBoard.textContent = `Value: ${potentialPoints}`;
                }
            }, tickRate);

            const genresString = movieData.genres ? formatArrayClue(movieData.genres, 'tag') : "";
            const directorsString = movieData.directors ? formatArrayClue(movieData.directors, 'tag') : "";

            currentCluesTimeline = [
                { el: clueElements.year, label: "Year", value: movieData.year, delay: 1500 },
                { el: clueElements.contentRating, label: "Content Rating", value: movieData.contentRating, delay: 2500 },
                { el: clueElements.runtime, label: "Runtime", value: movieData.runtime, delay: 3500 },
                { el: clueElements.studio, label: "Studio", value: movieData.studio, delay: 4500 },
                { el: clueElements.genres, label: "Genres", value: genresString, delay: 5500 },
                { el: clueElements.directors, label: "Director(s)", value: directorsString, delay: 6500 },
                { el: clueElements.tagline, label: "Tagline", value: movieData.tagline, delay: 7500 }
            ];

            currentCluesTimeline.forEach(clue => {
                const timeoutId = setTimeout(() => { displayClueWithLabel(clue.el, clue.label, clue.value); }, clue.delay);
                activeTimeouts.push(timeoutId);
            });
            
            const revealId = setTimeout(() => {
                if (!hasGuessed) {
                    hasGuessed = true;
                    potentialPoints = 0;
                    strikes += 1; 
                    
                    sfxWrong.currentTime = 0;
                    sfxWrong.play().catch(e => console.warn("Audio play error:", e));
                    fadeOutThemeAudio(); 
                    
                    progressBar.style.transition = 'opacity 0.3s ease-out';
                    progressBar.style.opacity = '0';
                    potentialBoard.style.opacity = '0';
                    choicesBox.style.opacity = '0';
                    
                    forceRevealAllClues();
                    updateStatsDisplay();

                    if (!checkStrikeOutCondition()) revealMoviePoster(correctTitle);
                }
            }, totalUnblurTime);
            
            activeTimeouts.push(revealId);
        }

        function loadNextMovie() {
            if (moviesList.length === 0 && showsList.length === 0) return;

            let isTvRound = (totalRoundsPlayed % TV_SHOW_FREQUENCY === 0) && (showsList.length > 0);
            
            if (isTvRound && showIndex >= showsList.length) {
                showIndex = 0; 
                shuffleArray(showsList);
            }
            if (!isTvRound && movieIndex >= moviesList.length) {
                movieIndex = 0; 
                shuffleArray(moviesList);
            }

            let dataToPlay;
            if (isTvRound || moviesList.length === 0) {
                dataToPlay = showsList[showIndex];
                showIndex++;
            } else {
                dataToPlay = moviesList[movieIndex];
                movieIndex++;
            }
            
            totalRoundsPlayed++;
            runMovieSequence(dataToPlay);
        }

        movieThumb.onerror = function() {
            console.warn("Skipping broken asset:", movieThumb.src);
            loadNextMovie();
        };
    </script>
</body>
